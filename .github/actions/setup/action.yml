name: Setup and Install deps
description: Setup Node.js/pnpm. Install dependencies.
runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@v5
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
        cache: pnpm
    - name: Install deps
      run: pnpm install
      shell: bash
